  # ---- 测试任务：调用 sdc.Invoke/RefreshUserToken 刷新用户 token（每 30 分钟触发）----
  - name: 南阳盛世门禁-刷新用户token
    task_type: sdc_refresh_user_token
    cron: "0,30 * * * *"                 # 每 30 分钟触发一次（每小时的 0 分与 30 分）；asynq 为标准 5 字段 cron：分 时 日 月 周
    protocol: grpc
    enabled: true
    timeout: 30s
    retry: 0                          # 测试期不重试，失败立即落日志方便定位
    endpoint: "192.168.31.45:20001"  # 下游 host:port，请通过环境变量注入或直接改为实际地址
    grpc_service: "sdc.Invoke"        # 包.服务
    grpc_method: "RefreshUserToken"   # -> /sdc.Invoke/RefreshUserToken
    request_type: "sdc.RefreshUserTokenReq"
    payload:
      uid: ""
      refresh_token: ""
    metadata:
      x-krono-task: ""

  # ---- 调试任务：用于排查「定时任务为何不生效」（GET 无参，每分钟触发）----
  - name: 调试-Http接口配置探测
    task_type: debug_ui_config_probe
    cron: "* * * * *"               # 每分钟触发一次，便于快速观察是否真的被执行
    protocol: http
    enabled: true
    timeout: 30s
    retry: 0                        # 不重试，失败立即落 failed 日志，方便定位问题
    endpoint: "https://one.haiqiu.top:12345/admin/api/v1/ui/config"
    method: GET                     # GET 请求，无任何参数、无请求体
