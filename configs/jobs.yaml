# krono-job 调度任务定义（声明式，不落库；PLAN §五）
#
# 字段说明见 PLAN.md §5.3。${ENV} 在启动时替换为环境变量（headers/metadata/endpoint 等）。
# 修改本文件后无需重启服务：调度内核通过 fsnotify 热重载（增/删/改自动生效）。
# 若 YAML 解析失败，保留上次有效配置并记错误日志，不影响运行。

jobs:
  # ---- HTTP 任务示例（纯配置，无需写对接代码）----
